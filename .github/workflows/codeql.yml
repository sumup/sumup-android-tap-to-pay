name: CodeQL SAST

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "23 9 * * 3" # GitHub cron is UTC
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["java-kotlin", "actions"]
        exclude:
          # java-kotlin needs private Maven credentials that are unavailable on fork PRs
          - language: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository && 'java-kotlin' || 'none' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@6bc82e05fd0ea64601dd4b465378bbcf57de0314 # v4.32.1
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        if: matrix.language == 'java-kotlin'
        env:
          TAP_TO_PAY_MAVEN_USER: ${{ secrets.TAP_TO_PAY_MAVEN_USER }}
          TAP_TO_PAY_MAVEN_PASSWORD: ${{ secrets.TAP_TO_PAY_MAVEN_PASSWORD }}
        uses: github/codeql-action/autobuild@6bc82e05fd0ea64601dd4b465378bbcf57de0314 # v4.32.1

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@6bc82e05fd0ea64601dd4b465378bbcf57de0314 # v4.32.1
        with:
          category: "/language:${{ matrix.language }}"
