# Tribe and Squad identification
tribe: Hardware
squad: Android

security_tools:

  # Secrets Detection
  secrets_detection: # Github Advanced Security
    enabled: 1
    secrets_scanning: 1
    pr_based: # https://github.com/sumup/secrets-detection#pr-check-optional
      enabled: 0
  
  # Static Application Security Testing (SAST)
  sast:
    enabled: 1
    tools:
      codeQL: 
        enabled: 1
        config_file_path: '-' 
      veracode:
        enabled: 0
      sobelow:
        enabled: 0
      credo: 
        enabled: 0
      klocwork:
        enabled: 0
      sfdx-scanner:
        enabled: 0

  # SCA (Software Composition Analysis)
  sca:
    dependabot: 
      enabled: 1
      config_file_path: '.github/dependabot.yml'  
    dependency_review: # https://github.com/sumup/dependency-review
      enabled: 0

  # Container Security
  container_security:
    trivy:
      enabled: 0

  # IaC (Infrastructure-as-code) security
  iac_security:
    tfsec:
      enabled: 0
      
  # Dynamic Application Security Testing (DAST)
  dast:
    zap:
      enabled: 0
